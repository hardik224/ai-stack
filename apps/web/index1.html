<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Stack Web</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #111827;
      color: #f9fafb;
    }
    .card {
      max-width: 800px;
      padding: 24px;
      border-radius: 12px;
      background: #1f2937;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    h1 {
      margin-top: 0;
    }
    code {
      background: #374151;
      padding: 2px 6px;
      border-radius: 6px;
    }
    .links a {
      color: #60a5fa;
      text-decoration: none;
      display: inline-block;
      margin-right: 16px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>AI Stack Web</h1>
    <p>Web service is running.</p>
    <p>API health endpoint is available at <code>/api-health</code>.</p>
    <div class="links">
      <a href="/api-health" target="_blank">Open API Health</a>
    </div>
  </div>
</body>
</html>
