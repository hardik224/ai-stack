<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document Upload</title>
  <style>
    :root {
      --bg-1: #0f172a;
      --bg-2: #1e293b;
      --card: rgba(255, 255, 255, 0.1);
      --card-border: rgba(255, 255, 255, 0.16);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --primary: #60a5fa;
      --primary-2: #34d399;
      --success-bg: rgba(34, 197, 94, 0.14);
      --success-border: rgba(34, 197, 94, 0.3);
      --error-bg: rgba(248, 113, 113, 0.14);
      --error-border: rgba(248, 113, 113, 0.3);
      --radius: 24px;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(96, 165, 250, 0.2), transparent 30%),
        radial-gradient(circle at bottom right, rgba(52, 211, 153, 0.18), transparent 28%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      padding: 32px;
    }

    .badge {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: rgba(96, 165, 250, 0.14);
      border: 1px solid rgba(96, 165, 250, 0.24);
      color: #bfdbfe;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 0 0 28px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #dbeafe;
    }

    .input,
    .select,
    .dropzone {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(15, 23, 42, 0.42);
      color: var(--text);
      border-radius: 16px;
      padding: 14px 16px;
      outline: none;
      transition: 0.2s ease;
      font-size: 15px;
    }

    .input:focus,
    .select:focus,
    .dropzone.dragover {
      border-color: rgba(96, 165, 250, 0.65);
      box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.12);
    }

    .select {
      appearance: none;
    }

    .dropzone {
      min-height: 170px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      padding: 24px;
    }

    .dropzone input {
      display: none;
    }

    .upload-icon {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .drop-title {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 6px;
    }

    .drop-subtitle {
      color: var(--muted);
      font-size: 13px;
    }

    .file-info {
      display: none;
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .file-info strong {
      display: block;
      margin-bottom: 6px;
      font-size: 15px;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      flex: 1;
      border: 0;
      border-radius: 16px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary {
      color: #06202d;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
    }

    .btn-secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .progress-wrap {
      display: none;
      margin-top: 20px;
    }

    .progress-head {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .progress {
      width: 100%;
      height: 12px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--primary), var(--primary-2));
      transition: width 0.25s ease;
    }

    .message {
      display: none;
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
    }

    .message.success {
      display: block;
      background: var(--success-bg);
      border: 1px solid var(--success-border);
      color: #dcfce7;
    }

    .message.error {
      display: block;
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      color: #fee2e2;
    }

    .helper {
      margin-top: 18px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .card {
        padding: 24px;
      }

      .actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Upload Your Document</h1>
    <p class="subtitle">
      Select your file, and upload it securely.
    </p>

    <div class="field">
      <label for="category">Document Category</label>
      <select id="category" class="select">
        <option value="general_documents">General Documents</option>
        <!-- <option value="reports">File</option> -->
        <option value="contracts">Youtube Link</option>
        <!-- <option value="policies">Policies</option>
        <option value="invoices">Invoices</option> -->
      </select>
    </div>

    <div class="field">
      <label>Select File</label>
      <label class="dropzone" id="dropZone" for="fileInput">
        <input type="file" id="fileInput" />
        <div>
          <div class="upload-icon">⬆</div>
          <div class="drop-title">Drag and drop your file here</div>
          <div class="drop-subtitle">or click to choose a file</div>
        </div>
      </label>
      <div class="file-info" id="fileInfo"></div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="uploadBtn" onclick="uploadFile()">Upload</button>
      <button class="btn btn-secondary" onclick="resetForm()">Clear</button>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-head">
        <span id="progressText">Preparing upload...</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>

    <div class="message" id="messageBox"></div>

    <div class="helper">
      Supported by your document processing system.
    </div>
  </div>

  <script>
    const UPLOAD_URL = "https://ews-ai-stack-api.portal-evital.com/upload";

    const fileInput = document.getElementById("fileInput");
    const fileInfo = document.getElementById("fileInfo");
    const dropZone = document.getElementById("dropZone");
    const uploadBtn = document.getElementById("uploadBtn");
    const progressWrap = document.getElementById("progressWrap");
    const progressBar = document.getElementById("progressBar");
    const progressText = document.getElementById("progressText");
    const progressPercent = document.getElementById("progressPercent");
    const messageBox = document.getElementById("messageBox");

    fileInput.addEventListener("change", updateFileInfo);

    ["dragenter", "dragover"].forEach((eventName) => {
      dropZone.addEventListener(eventName, (e) => {
        e.preventDefault();
        dropZone.classList.add("dragover");
      });
    });

    ["dragleave", "drop"].forEach((eventName) => {
      dropZone.addEventListener(eventName, (e) => {
        e.preventDefault();
        dropZone.classList.remove("dragover");
      });
    });

    dropZone.addEventListener("drop", (e) => {
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        fileInput.files = files;
        updateFileInfo();
      }
    });

    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + " KB";
      if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(2) + " MB";
      return (bytes / (1024 * 1024 * 1024)).toFixed(2) + " GB";
    }

    function updateFileInfo() {
      clearMessage();
      const file = fileInput.files[0];

      if (!file) {
        fileInfo.style.display = "none";
        fileInfo.innerHTML = "";
        return;
      }

      fileInfo.style.display = "block";
      fileInfo.innerHTML = `
        <strong>${file.name}</strong>
        <div>Size: ${formatFileSize(file.size)}</div>
      `;
    }

    function setProgress(value, text) {
      progressWrap.style.display = "block";
      progressBar.style.width = value + "%";
      progressPercent.textContent = value + "%";
      progressText.textContent = text;
    }

    function showMessage(type, text) {
      messageBox.className = "message " + type;
      messageBox.textContent = text;
    }

    function clearMessage() {
      messageBox.className = "message";
      messageBox.textContent = "";
    }

    function resetForm() {
      fileInput.value = "";
      document.getElementById("category").value = "general_documents";
      fileInfo.style.display = "none";
      fileInfo.innerHTML = "";
      progressWrap.style.display = "none";
      progressBar.style.width = "0%";
      progressPercent.textContent = "0%";
      progressText.textContent = "Preparing upload...";
      clearMessage();
    }

    async function uploadFile() {
      const file = fileInput.files[0];
      const category = document.getElementById("category").value;

      clearMessage();

      if (!file) {
        showMessage("error", "Please select a file to upload.");
        return;
      }

      const formData = new FormData();
      formData.append("file", file);
      formData.append("category", category);

      uploadBtn.disabled = true;

      try {
        setProgress(20, "Uploading file...");
        await new Promise((resolve) => setTimeout(resolve, 200));

        const response = await fetch(UPLOAD_URL, {
          method: "POST",
          body: formData
        });

        setProgress(80, "Finalizing...");
        const raw = await response.text();

        let data;
        try {
          data = JSON.parse(raw);
        } catch {
          data = {};
        }

        setProgress(100, "Done");

        if (response.ok) {
          showMessage("success", "Your document has been uploaded successfully.");
        } else {
          showMessage("error", data.message || "Upload failed. Please try again.");
        }
      } catch (error) {
        setProgress(100, "Failed");
        showMessage("error", "Unable to upload right now. Please try again later.");
      } finally {
        uploadBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
